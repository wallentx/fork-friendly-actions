name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "release/**"

permissions:
  contents: read
  actions: read
  attestations: read
  checks: read
  deployments: read
  discussions: read
  issues: read
  packages: read
  pages: read
  pull-requests: read
  repository-projects: read
  statuses: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Actions Toolbox
        env:
          GH_TOKEN: ${{ github.token }}
        uses: wallentx/gh-actions/composite/actions-toolbox@main

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build bundles
        run: npm run build

      - name: Check committed action bundle
        run: git diff --exit-code -- dist/action/index.js dist/action/licenses.txt dist/data/public-github-hosted-runners.txt

      - name: Check workflow shell scripts
        run: bash -n scripts/create-checkpoint-pr.sh

      - name: Check workflow JavaScript scripts
        run: node --check scripts/resolve-release-version.js && node --check scripts/build-action.js
