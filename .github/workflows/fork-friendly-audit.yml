name: Fork Friendly Audit

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - "action.yml"
      - "src/**"
      - "dist/action/**"
  push:
    branches:
      - main
      - "release/**"
    paths:
      - ".github/workflows/**"
      - "action.yml"
      - "src/**"
      - "dist/action/**"

permissions:
  contents: read
  actions: read
  attestations: read
  checks: read
  deployments: read
  discussions: read
  issues: read
  packages: read
  pages: read
  pull-requests: read
  repository-projects: read
  statuses: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Actions Toolbox
        env:
          GH_TOKEN: ${{ github.token }}
        uses: wallentx/gh-actions/composite/actions-toolbox@main

      - name: Audit workflows
        uses: ./
        with:
          fail-on: warning
