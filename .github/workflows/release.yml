name: Release

on:
  workflow_dispatch:
    inputs:
      rc_tag:
        description: RC tag to promote, for example v1.2.3-rc.42
        required: true
        type: string

permissions:
  contents: write
  actions: read
  attestations: read
  checks: read
  deployments: read
  discussions: read
  issues: read
  packages: write
  pages: read
  pull-requests: read
  repository-projects: read
  statuses: read

concurrency:
  group: release-${{ inputs.rc_tag }}
  cancel-in-progress: false

jobs:
  promote:
    if: github.repository == 'wallentx/fork-friendly-actions'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Actions Toolbox
        env:
          GH_TOKEN: ${{ github.token }}
        uses: wallentx/gh-actions/composite/actions-toolbox@main

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          cache: npm

      - name: Resolve release target
        id: version
        shell: bash
        run: |
          set -euo pipefail
          rc_tag="${{ inputs.rc_tag }}"
          if [[ ! "$rc_tag" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)-rc\.[0-9]+$ ]]; then
            echo "rc_tag must look like v1.2.3-rc.42" >&2
            exit 1
          fi
          base_version="${BASH_REMATCH[1]}"
          release_tag="v${base_version}"
          rc_sha="$(git rev-list -n 1 "$rc_tag")"
          echo "base-version=${base_version}" >> "$GITHUB_OUTPUT"
          echo "npm-version=${base_version}" >> "$GITHUB_OUTPUT"
          echo "tag-name=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "release-tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "npm-tag=latest" >> "$GITHUB_OUTPUT"
          echo "source-sha=${rc_sha}" >> "$GITHUB_OUTPUT"

      - name: Checkout RC source
        run: git checkout --detach "${{ steps.version.outputs.source-sha }}"

      - name: Download RC artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p promoted-artifacts
          gh release download "${{ inputs.rc_tag }}" --dir promoted-artifacts

      - name: Install dependencies
        run: npm ci

      - name: Set package version
        run: npm version "${{ steps.version.outputs.npm-version }}" --no-git-tag-version --allow-same-version

      - name: Build
        run: npm run build

      - name: Create release artifacts
        run: |
          set -euo pipefail
          mkdir -p artifacts
          cp dist/ffactions artifacts/ffactions
          if [ -f promoted-artifacts/ffactions ]; then
            cmp promoted-artifacts/ffactions artifacts/ffactions
          fi
          if [ -f promoted-artifacts/release-manifest.txt ]; then
            cp promoted-artifacts/release-manifest.txt artifacts/promoted-release-manifest.txt
          fi
          npm pack --pack-destination artifacts
          sha256sum artifacts/* > artifacts/SHA256SUMS
          {
            echo "source_sha=${{ steps.version.outputs.source-sha }}"
            echo "promoted_from=${{ inputs.rc_tag }}"
            echo "npm_version=${{ steps.version.outputs.npm-version }}"
            echo "tag_name=${{ steps.version.outputs.tag-name }}"
            echo "npm_tag=${{ steps.version.outputs.npm-tag }}"
            echo "workflow_run=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          } > artifacts/release-manifest.txt

      - name: Publish package to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}
        run: npm publish --tag "${{ steps.version.outputs.npm-tag }}"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ steps.version.outputs.tag-name }}"
          git tag -f "$tag" "${{ steps.version.outputs.source-sha }}"
          git push origin "refs/tags/${tag}" --force
          gh release create "$tag" artifacts/* \
            --target "${{ steps.version.outputs.source-sha }}" \
            --title "Fork Friendly Actions $tag" \
            --notes "Promoted from ${{ inputs.rc_tag }}."
          major_tag="${tag%%.*}"
          git tag -f "$major_tag" "${{ steps.version.outputs.source-sha }}"
          git push origin "refs/tags/${major_tag}" --force
